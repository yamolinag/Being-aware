<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cuenta - Being aware</title>
    <link rel="stylesheet" href="Reset.css">
    <link rel="stylesheet" href="cuenta.css">
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
    <header>
        <H1>Being aware</H1>
        <H2>Gestión de cuenta</H2>
    </header>

    <details id="panellateral">
        <summary><span class="material-symbols-outlined">menu</span></summary>
        <div id="buttoncontainerpanel">
            <button onclick="changeSection('cuenta.html')" class="buttonlateral"><span class="material-symbols-outlined">account_circle</span></button>
            <button onclick="changeSection('index.html')" class="buttonlateral"><span class="material-symbols-outlined">home</span></button>
            <button onclick="changeSection('Being_aware_Forum.html')" class="buttonlateral"><span class="material-symbols-outlined">forum</span></button>
            <button onclick="changeSection('news.html')" class="buttonlateral"><span class="material-symbols-outlined">newspaper</span></button>    
        </div>
    </details>

    <div id="update-form">
        <button onclick="cancelar()" id="cancelar"><span class="material-symbols-outlined">close</span></button>
        <H1>Editar Perfil</H1>
        <p>Actualiza tu información de perfil. Los campos que no rellenes permanecerán sin cambios.</p>
        <div class="logininput">
            <label for="Photo">Foto de perfil</label>
            <input type="file" id="fileInputupdate" accept="image/*" />
        </div>
        <div class="logininput">
            <label for="User">Usuario</label>
            <input type="text" id="Userupdate" placeholder="Nombre de usuario">
        </div>
        <div class="logininput">
            <label for="E-mail">E-mail</label>
            <input type="email" id="E-mailupdate" placeholder="Tu correo electrónico">
            <button onclick="actualizarPerfil()" class="main-auth-btn"><span class="material-symbols-outlined">published_with_changes</span>Actualizar</button>
            <button class="main-auth-btn"><span class="material-symbols-outlined">key</span> Cambiar Contraseña</button>
        </div>
    </div>

    <main id="main-content">
        <div id="auth-forms">
            <div id="register-section">
                <H1>Registrarse</H1>
                <div class="logininput">
                    <label for="User">Usuario</label>
                    <input type="text" id="User" placeholder="Nombre de usuario">
                </div>
                <div class="logininput">
                    <label for="E-mail">E-mail</label>
                    <input type="email" id="E-mail" placeholder="Tu correo electrónico">
                </div>
                <div class="logininput">
                    <label for="Password">Contraseña</label>
                    <input type="password" id="Password" placeholder="Mínimo 6 caracteres">
                </div>
                <button onclick="login()" class="main-auth-btn">Registrarse</button>
            </div>

            <div id="login-section">
                <H1>Iniciar sesión</H1>
                <div class="logininput">
                    <label for="E-mailsesion">E-mail</label>
                    <input type="email" id="E-mailsesion" placeholder="Tu correo electrónico">
                </div>
                <div class="logininput">
                    <label for="Passwordsesion">Contraseña</label>
                    <input type="password" id="Passwordsesion" placeholder="Tu contraseña">
                </div>
                <button onclick="entrar()" class="main-auth-btn">Iniciar sesión</button>
            </div>
        </div>

        <div id="user-info" style="display: none;">
            <H1>Sesión activa</H1>
            <div id="useravatar">
                <p id="acountcircul"><span class="material-symbols-outlined">account_circle</span></p>
            </div>
            <h1 id="active-user-msg"></h1>
            <button onclick="editarPerfil()" class="main-auth-btn"><span class="material-symbols-outlined">edit</span> Editar Perfil</button>
            <button onclick="cerrarSesion()" class="main-auth-btn" id="logout-btn"><span class="material-symbols-outlined">logout</span> Cerrar Sesión</button>
        </div>
    </main>

    <script type="module" src="cuenta.js"></script>
</body>
</html>
